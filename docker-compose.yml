services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/attendance-system
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=attendance_db
      - DB_USER=attendance_user
      - DB_PASS=attendance_pass_2024
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_2024
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_user
      MYSQL_PASSWORD: attendance_pass_2024
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: attendance_user
      PMA_PASSWORD: attendance_pass_2024
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
